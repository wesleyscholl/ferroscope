name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ferroscope-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ferroscope-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ferroscope-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ferroscope-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz ferroscope
          mv ${{ matrix.artifact }}.tar.gz ../../../

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ferroscope.exe -DestinationPath ${{ matrix.artifact }}.zip
          Move-Item ${{ matrix.artifact }}.zip ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Ferroscope ${{ github.ref_name }}
          body: |
            ## 🦀 Ferroscope ${{ github.ref_name }}

            16 live interactive Rust demos in your terminal.

            ### Install

            **macOS (Apple Silicon)**
            ```bash
            curl -LO https://github.com/wesleyscholl/ferroscope/releases/download/${{ github.ref_name }}/ferroscope-macos-aarch64.tar.gz
            tar xzf ferroscope-macos-aarch64.tar.gz && chmod +x ferroscope && mv ferroscope /usr/local/bin/
            ```

            **macOS (Intel)**
            ```bash
            curl -LO https://github.com/wesleyscholl/ferroscope/releases/download/${{ github.ref_name }}/ferroscope-macos-x86_64.tar.gz
            tar xzf ferroscope-macos-x86_64.tar.gz && chmod +x ferroscope && mv ferroscope /usr/local/bin/
            ```

            **Linux**
            ```bash
            curl -LO https://github.com/wesleyscholl/ferroscope/releases/download/${{ github.ref_name }}/ferroscope-linux-x86_64.tar.gz
            tar xzf ferroscope-linux-x86_64.tar.gz && chmod +x ferroscope && mv ferroscope /usr/local/bin/
            ```

            **Or build from source:**
            ```bash
            cargo install ferroscope
            ```

            ### What's in this release
            See [PLAN.md](https://github.com/wesleyscholl/ferroscope/blob/master/PLAN.md) for full feature list.
          files: artifacts/**/*
          draft: false
          prerelease: false
